<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA — AI Avatar</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05080f;font-family:'Segoe UI',sans-serif}
  #ui{position:fixed;top:12px;left:50%;transform:translateX(-50%);color:#7dd6ff;font-weight:700;letter-spacing:3px;pointer-events:none;text-align:center;z-index:2;text-shadow:0 0 12px rgba(125,214,255,.8)}
  #ui small{display:block;font-weight:400;opacity:.6;font-size:11px;letter-spacing:1px;color:#9ab8cc}
  #panel{position:fixed;bottom:0;left:0;right:0;padding:12px;display:flex;flex-direction:column;gap:8px;align-items:center;z-index:2}
  #subtitle{max-width:680px;background:rgba(8,20,35,.85);border:1px solid rgba(125,214,255,.35);border-radius:14px;padding:10px 16px;color:#cfeeff;font-size:15px;line-height:1.45;box-shadow:0 0 24px rgba(60,160,255,.25);min-height:20px;backdrop-filter:blur(6px)}
  #controls{display:flex;gap:8px;width:100%;max-width:680px}
  #micBtn{width:54px;height:54px;border-radius:50%;border:1px solid rgba(125,214,255,.6);background:rgba(20,60,110,.7);color:#bfe9ff;font-size:22px;cursor:pointer;flex-shrink:0;transition:.2s;box-shadow:0 0 16px rgba(60,160,255,.5)}
  #micBtn.listening{background:#c01d3c;border-color:#ff7a96;animation:pulse 1s infinite}
  @keyframes pulse{50%{transform:scale(1.12);box-shadow:0 0 26px rgba(255,80,120,.8)}}
  #txt{flex:1;border:1px solid rgba(125,214,255,.35);border-radius:27px;padding:0 18px;font-size:15px;background:rgba(8,20,35,.85);color:#dff4ff;outline:none}
  #txt::placeholder{color:#5e7d94}
  #sendBtn{height:54px;padding:0 22px;border:1px solid rgba(125,214,255,.6);border-radius:27px;background:rgba(20,60,110,.7);color:#bfe9ff;font-weight:600;cursor:pointer}
  #status{font-size:12px;color:#6fa9c9}
  canvas{display:block}
</style>
</head>
<body>
<div id="ui">N E X A<small>ASISTENTE IA · Habla con el micrófono · responde por n8n</small></div>
<div id="panel">
  <div id="subtitle">Presiona el micrófono y háblame.</div>
  <div id="controls">
    <button id="micBtn" title="Hablar">🎤</button>
    <input id="txt" placeholder="...o escribe y presiona Enter">
    <button id="sendBtn">Enviar</button>
  </div>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ╔══════════════════════════════════════════════╗
   ║  CONFIGURA AQUÍ TU WEBHOOK DE N8N            ║
   ╚══════════════════════════════════════════════╝ */
const N8N_WEBHOOK_URL = 'http://localhost:5678/webhook/interview';
// Envía:  POST { "message": "texto del usuario", "sessionId": "..." }
// Espera: { "output": "respuesta" }  (también acepta reply/response/text/message)
const VOICE_LANG = 'en-US';   // idioma del parlante y del micrófono ('en-US' si quieres inglés)

/* ============ ESCENA ============ */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05080f, .06);
const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, .1, 60);
function frameCamera(){
  const a = innerWidth/innerHeight;
  camera.aspect = a;
  // calcula la distancia para que TODO el avatar quepa (ancho y alto)
  const vFov = THREE.MathUtils.degToRad(38);
  const hFov = 2*Math.atan(Math.tan(vFov/2)*a);
  const halfW = 1.9, halfH = 2.0; // alcance del avatar (anillos + antena + núcleo)
  const dist = Math.max(halfW/Math.tan(hFov/2), halfH/Math.tan(vFov/2)) + .6;
  camera.position.set(0, .1, dist);
  camera.lookAt(0, -.05, 0);
  camera.updateProjectionMatrix();
}
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setClearColor(0x05080f);
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);
frameCamera();

scene.add(new THREE.AmbientLight(0x224466, .8));
const keyL = new THREE.PointLight(0x55bbff, 1.4, 20); keyL.position.set(3,3,4); scene.add(keyL);
const fillL = new THREE.PointLight(0xaa66ff, .8, 20); fillL.position.set(-4,-1,3); scene.add(fillL);

/* ============ MATERIALES ============ */
const glowCyan = new THREE.MeshBasicMaterial({color:0x6fe0ff});
const glowCore = new THREE.MeshBasicMaterial({color:0xbff4ff});
const shellMat = new THREE.MeshStandardMaterial({color:0x101b2c, roughness:.25, metalness:.85});
const darkMat  = new THREE.MeshStandardMaterial({color:0x070d18, roughness:.4, metalness:.7});
const wireMat  = new THREE.MeshBasicMaterial({color:0x3aa8e8, wireframe:true, transparent:true, opacity:.18});

const bot = new THREE.Group(); scene.add(bot);

/* ============ CABEZA ROBÓTICA ============ */
const headG = new THREE.Group(); headG.position.y = .55; bot.add(headG);
const helmet = new THREE.Mesh(new THREE.SphereGeometry(.78, 48, 48), shellMat);
helmet.scale.set(.92, 1, .95); headG.add(helmet);
const helmetWire = new THREE.Mesh(new THREE.SphereGeometry(.80, 24, 24), wireMat);
helmetWire.scale.copy(helmet.scale); headG.add(helmetWire);

/* visor frontal */
const visor = new THREE.Mesh(new THREE.SphereGeometry(.70, 48, 48, -Math.PI/2.6, Math.PI/1.3, Math.PI/4, Math.PI/2.6), darkMat);
visor.position.z = .12; headG.add(visor);

/* OJOS de luz */
const eyes = [];
[-1,1].forEach(s=>{
  const eye = new THREE.Group(); eye.position.set(.26*s, .08, .68); headG.add(eye);
  const e1 = new THREE.Mesh(new THREE.SphereGeometry(.10,24,24), glowCyan);
  e1.scale.set(1.25,.7,.4); eye.add(e1);
  const e2 = new THREE.Mesh(new THREE.SphereGeometry(.05,16,16), glowCore);
  e2.position.z = .03; e2.scale.set(1.25,.7,.5); eye.add(e2);
  const halo = new THREE.PointLight(0x6fe0ff, .5, 3); halo.position.z=.2; eye.add(halo);
  eyes.push(eye);
});

/* BOCA: ecualizador de barras (lip-sync visual) */
const mouthBars = [];
const mouthG = new THREE.Group(); mouthG.position.set(0, -.30, .70); headG.add(mouthG);
for(let i=0;i<7;i++){
  const bar = new THREE.Mesh(new THREE.BoxGeometry(.045,.05,.03), glowCyan);
  bar.position.x = (i-3)*.075;
  mouthG.add(bar); mouthBars.push(bar);
}

/* antena */
const antenna = new THREE.Mesh(new THREE.CylinderGeometry(.02,.025,.35,10), shellMat);
antenna.position.set(0,.95,0); headG.add(antenna);
const antennaTip = new THREE.Mesh(new THREE.SphereGeometry(.06,16,16), glowCyan);
antennaTip.position.set(0,1.15,0); headG.add(antennaTip);

/* "orejas" laterales con luz */
[-1,1].forEach(s=>{
  const pod = new THREE.Mesh(new THREE.CylinderGeometry(.14,.14,.10,24), shellMat);
  pod.rotation.z = Math.PI/2; pod.position.set(.74*s,.02,0); headG.add(pod);
  const ring = new THREE.Mesh(new THREE.TorusGeometry(.10,.018,12,32), glowCyan);
  ring.rotation.y = Math.PI/2; ring.position.set(.80*s,.02,0); headG.add(ring);
});

/* ============ NÚCLEO / PECHO HOLOGRÁFICO ============ */
const core = new THREE.Mesh(new THREE.IcosahedronGeometry(.30, 1), glowCyan);
core.position.y = -.85; bot.add(core);
const coreWire = new THREE.Mesh(new THREE.IcosahedronGeometry(.42, 1), wireMat);
coreWire.position.y = -.85; bot.add(coreWire);
const coreLight = new THREE.PointLight(0x6fe0ff, 1.2, 6); coreLight.position.set(0,-.85,.5); bot.add(coreLight);

/* anillos orbitales animados */
const rings = [];
[[1.15,.012,-.85,.5,0],[1.35,.010,-.85,-.9,.6],[1.55,.008,-.85,.4,-.8]].forEach((r,i)=>{
  const ring = new THREE.Mesh(new THREE.TorusGeometry(r[0],r[1],10,80),
    new THREE.MeshBasicMaterial({color: i===1?0xb07aff:0x5fcfff, transparent:true, opacity:.7}));
  ring.position.y = r[2];
  scene.add(ring); // independiente de bot para girar libre
  rings.push({m:ring, sx:r[3], sy:r[4]});
});

/* partículas flotantes */
const pGeo = new THREE.BufferGeometry();
const pCount = 350, pPos = new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){
  pPos[i*3]   = (Math.random()-.5)*12;
  pPos[i*3+1] = (Math.random()-.5)*8;
  pPos[i*3+2] = (Math.random()-.5)*8 - 2;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({color:0x3f8fce, size:.025, transparent:true, opacity:.8}));
scene.add(particles);

/* grilla de piso neón */
const grid = new THREE.GridHelper(24, 48, 0x2a6f9e, 0x123048);
grid.position.y = -2.2; scene.add(grid);

/* ============ ANIMACIÓN ============ */
let mouse={x:0,y:0}, speaking=false, thinking=false;
addEventListener('mousemove', e=>{
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
});
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.elapsedTime;

  /* flotación */
  bot.position.y = Math.sin(t*1.3)*.08;
  /* cabeza sigue cursor */
  const lx = THREE.MathUtils.clamp(mouse.x*.45,-.45,.45);
  const ly = THREE.MathUtils.clamp(mouse.y*.3,-.3,.3);
  headG.rotation.y += (lx-headG.rotation.y)*.07;
  headG.rotation.x += (-ly-headG.rotation.x)*.07;

  /* boca-ecualizador: baila al hablar */
  mouthBars.forEach((b,i)=>{
    const target = speaking
      ? .05 + Math.abs(Math.sin(t*13 + i*1.4))*.22 + Math.random()*.04
      : .05 + Math.sin(t*2 + i)*.008;
    b.scale.y += (target/.05 - b.scale.y)*.3;
  });

  /* ojos: parpadeo digital + modo pensar */
  const blink = (Math.sin(t*0.9)>0.985) ? .08 : 1;
  eyes.forEach((e,i)=>{
    e.scale.y = thinking ? .25+Math.abs(Math.sin(t*6+i*Math.PI))*.5 : blink;
  });
  antennaTip.material.color.setHex(thinking ? 0xffb84d : (speaking ? 0x9dff6f : 0x6fe0ff));

  /* núcleo pulsante (late más rápido al hablar) */
  const beat = speaking ? 1+Math.abs(Math.sin(t*9))*.25 : 1+Math.sin(t*2.2)*.08;
  core.scale.setScalar(beat);
  core.rotation.y = t*.8; core.rotation.x = t*.4;
  coreWire.rotation.y = -t*.5;
  coreLight.intensity = speaking ? 1.6+Math.sin(t*9)*.6 : 1.2;

  /* anillos */
  rings.forEach(r=>{ r.m.rotation.x += r.sx*.008; r.m.rotation.y += r.sy*.008; r.m.position.y = -.85 + bot.position.y; });
  /* partículas suben lento */
  const arr = particles.geometry.attributes.position.array;
  for(let i=0;i<pCount;i++){
    arr[i*3+1] += .003;
    if(arr[i*3+1] > 4) arr[i*3+1] = -4;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.rotation.y = t*.02;

  renderer.render(scene,camera);
}
animate();
addEventListener('resize',()=>{frameCamera();renderer.setSize(innerWidth,innerHeight);});

/* ============ PARLANTE (TTS) ============ */
const subtitle=document.getElementById('subtitle');
const statusEl=document.getElementById('status');
let voiceSel=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  const base = VOICE_LANG.split('-')[0];
  voiceSel = vs.find(v=>v.lang.replace('_','-')===VOICE_LANG)
          || vs.find(v=>v.lang.startsWith(base)) || null;
}
speechSynthesis.onvoiceschanged=pickVoice; pickVoice();

let avatarAudio=new Audio();
function playAudio(b64,mime){
  speechSynthesis.cancel();
  avatarAudio.src='data:'+(mime||'audio/mpeg')+';base64,'+b64;
  avatarAudio.playbackRate=0.97;
  avatarAudio.onplay=()=>{speaking=true;};
  avatarAudio.onended=()=>{speaking=false;};
  avatarAudio.play().catch(()=>speak(subtitle.textContent));
}
function speak(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=VOICE_LANG; if(voiceSel)u.voice=voiceSel;
  u.rate=1.0; u.pitch=1.05;
  u.onstart=()=>{speaking=true;};
  u.onend=()=>{speaking=false;};
  speechSynthesis.speak(u);
}

/* ============ RESPUESTA DESDE N8N ============ */
const sessionId = 'nexa-' + Math.random().toString(36).slice(2,10);
async function askN8N(userText){
  thinking = true;
  statusEl.textContent = 'NEXA procesando...';
  try{
    const r = await fetch(N8N_WEBHOOK_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message:userText, sessionId })
    });
    const raw = await r.text();
    let reply = raw, audioB64='', audioMime='audio/mpeg';
    try{
      const d = JSON.parse(raw);
      const o = Array.isArray(d) ? d[0] : d;
      reply = o.interviewer || o.output || o.reply || o.response || o.text || o.message || raw;
      audioB64 = o.audio || ''; audioMime = o.audioMimeType || 'audio/mpeg';
    }catch(_){/* texto plano */}
    reply = String(reply).trim() || 'No recibí respuesta del flujo.';
    subtitle.textContent = reply;
    statusEl.textContent = '';
    if(audioB64){ playAudio(audioB64, audioMime); } else { speak(reply); }
  }catch(e){
    statusEl.textContent = 'No pude conectar con n8n. Verifica el webhook y CORS.';
  }finally{
    thinking = false;
  }
}

/* ============ MICRÓFONO (tú hablas) ============ */
const micBtn=document.getElementById('micBtn');
const txt=document.getElementById('txt');
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null, listening=false;
if(SR){
  rec=new SR();
  rec.lang=VOICE_LANG; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=e=>{
    const said=e.results[0][0].transcript;
    subtitle.textContent='🗣️ '+said;
    askN8N(said);
  };
  rec.onend=()=>{listening=false;micBtn.classList.remove('listening');};
  rec.onerror=e=>{
    listening=false;micBtn.classList.remove('listening');
    statusEl.textContent=e.error==='not-allowed'
      ?'Permite el micrófono o usa el cuadro de texto.'
      :'No te escuché, intenta otra vez.';
  };
}else{
  statusEl.textContent='Tu navegador no soporta micrófono — usa el texto (Chrome recomendado).';
}
micBtn.onclick=()=>{
  if(!rec)return;
  if(listening){rec.stop();return;}
  speechSynthesis.cancel();speaking=false;
  try{rec.start();listening=true;micBtn.classList.add('listening');statusEl.textContent='Escuchando...';}catch(_){}
};
function sendText(){
  const v=txt.value.trim();if(!v)return;
  txt.value='';subtitle.textContent='⌨️ '+v;
  askN8N(v);
}
document.getElementById('sendBtn').onclick=sendText;
txt.addEventListener('keydown',e=>{if(e.key==='Enter')sendText();});

/* auto-inicio: el reclutador explica y pregunta */
window.addEventListener('load',()=>{ setTimeout(()=>{ askN8N("START_INTERVIEW: You are a friendly job recruiter doing a job interview practice in English. First, warmly explain how the practice works, then ask: 'So, tell me a little about yourself.' Adapt to the student's level."); }, 600); });

</script>
</body>
</html>
